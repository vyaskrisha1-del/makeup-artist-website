{% load static %}

<!-- LOGO SPLASH SCREEN -->
<div id="splash-screen">
  <div class="logo-container text-center">
    <img
      src="{% static 'images/bb_logo.png' %}"
      alt="BB CARE"
      class="w-[260px]"
    />
  </div>
</div>

<style>
  #splash-screen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100vh;
    background: #fff9f7;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    transition: opacity 1.2s ease-in-out;
  }

  .logo-container {
    animation: logoPop 1.8s ease-in-out forwards;
  }

  @keyframes logoPop {
    0% {
      transform: scale(0.4) rotate(-10deg);
      opacity: 0;
    }
    60% {
      transform: scale(1.08) rotate(3deg);
    }
    100% {
      transform: scale(1) rotate(0deg);
      opacity: 1;
    }
  }
</style>
