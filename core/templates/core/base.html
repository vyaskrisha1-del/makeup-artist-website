{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- Tailwind CSS -->
    <link rel="stylesheet" href="{% static 'core/css/output.css' %}" />

    <title>BB CARE | Luxury Beauty Studio</title>
  </head>

  <body class="bg-[#FFF9F7] font-poppins overflow-x-hidden pt-28">
    <!-- Navbar -->
    {% include 'core/partials/navbar.html' %}

    <!-- Main Page Content -->
    <main class="pt-28">{% block content %}{% endblock %}</main>

    <!-- Footer -->
    {% include 'core/partials/footer.html' %}

    <!-- Main JS -->
    <script src="{% static 'core/js/main.js' %}"></script>
  </body>
</html>
